# ps5gov configuration
#
# Installed location:
#   /etc/ps5-linux-cpuclock/ps5gov.conf
#
# PROFILE may be auto, quiet, balanced, or performance.
# Explicit CPU_ARGS/GPU_ARGS override PROFILE defaults.
# FAN_ENABLED=0 disables automatic fan control by default.
# FAN_ARGS="-i 3000 -H 58 -L 48 -s auto"
# Current /dev/icc fan ioctl selects a servo pattern, not a raw PWM duty.
# Add "-a 0 -C 1" to make default/cool patterns explicit.

PROFILE=auto

# CPU_ARGS="-i 400 -d 4 -H 40 -M 20 -L 8"
# GPU_ARGS="-P balanced"
FAN_ENABLED=0
