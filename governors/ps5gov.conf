# ps5gov configuration
#
# Installed location:
#   /etc/ps5-linux-power/ps5gov.conf
#
# PROFILE may be auto, quiet, balanced, or performance.
# Explicit CPU_ARGS/GPU_ARGS override PROFILE defaults.
# FAN_ENABLED=1 starts ps5_fan_gov with gaming-oriented hysteresis by default.
# The default pattern stays active below 55 C; the cool pattern is selected at
# 55 C and held until temperature falls below 45 C.
# FAN_ARGS="-i 3000 -H 55 -L 45 -s auto"
# Current /dev/icc fan ioctl selects a servo pattern, not a raw PWM duty.
# Add "-a 0 -C 1" to make default/cool patterns explicit.
# Add "-q 10" to limit repetitive verbose hold logs.
# Staged fan curve, format: temp_up:target_temp:servo_pattern,...
# Tuned conservatively from PS5 traces: Shadow Trial reached 84 C with the
# default cool pattern, while MAINSOC target 70 C held roughly 70-72 C and was
# acceptable; 58 C was too loud.
FAN_CURVE="45:78:0,60:74:0,72:70:1,82:68:1,88:66:1"
FAN_HYSTERESIS=4

PROFILE=performance

# CPU_ARGS="-i 250 -d 6 -H 25 -M 12 -L 4"
# GPU_ARGS="-P performance"
FAN_ENABLED=1
