name: Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Package version to build without the leading v
        required: true
        default: 0.1.0

permissions:
  contents: write

env:
  PACKAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  deb:
    name: Debian and Ubuntu packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build deb packages
        run: VERSION="${PACKAGE_VERSION#v}" packaging/deb/build-deb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb

  rpm:
    name: Fedora RPM packages
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: dnf install -y gcc make rpm-build tar gzip findutils akmods
      - name: Build rpm packages
        run: VERSION="${PACKAGE_VERSION#v}" packaging/rpm/build-rpm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: dist/*.rpm

  arch:
    name: Arch packages
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: pacman -Syu --noconfirm base-devel git dkms
      - name: Build Arch packages
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c "cd '$GITHUB_WORKSPACE' && VERSION='${PACKAGE_VERSION#v}' packaging/arch/build-arch.sh"
      - uses: actions/upload-artifact@v4
        with:
          name: arch-packages
          path: dist/*.pkg.tar.*

  release:
    name: Publish GitHub release
    needs:
      - deb
      - rpm
      - arch
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          body_path: packaging/release/RELEASE_NOTES.md
          files: release-artifacts/*
